[toolchain]
anchor_version = "0.31.0"

[features]
resolution = true
skip-lint = false

[workspace]
members = ["programs/*"]
resolver = "2"

[programs.devnet]
bagxpress_vault = "BXPvau1tGodStackXXXXXXXXXXXXXXXXXXXXXXXXXXX"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
